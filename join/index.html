:root{--tan:#fbf3e2;--navy:#082B45;--amber:#D99A2B;--ink:#1a1208;--muted:#6b5630;--card:#fffdf7;--line:#e6d6b3}
*{box-sizing:border-box}
body{margin:0;background:var(--tan);color:var(--ink);font-family:Georgia,'Times New Roman',serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:460px;width:100%;padding:28px 26px;text-align:center;box-shadow:0 6px 24px rgba(8,43,69,.08)}
.logo{width:100%;max-width:300px;height:auto;margin:0 auto 14px;display:block}
h1{font-size:24px;color:var(--navy);margin:6px 0 4px;line-height:1.2}
p.sub{color:var(--muted);font-style:italic;margin:0 0 18px}
form{display:flex;flex-direction:column;gap:10px}
input[type=email]{padding:13px 14px;border:1px solid var(--line);border-radius:10px;font-size:16px;font-family:Arial,Helvetica,sans-serif;background:#fff;color:var(--ink)}
input[type=submit]{padding:13px 14px;border:0;border-radius:10px;background:var(--amber);color:#3a2700;font-weight:bold;font-size:16px;font-family:Arial,Helvetica,sans-serif;cursor:pointer}
input[type=submit]:hover{filter:brightness(.96)}
.fine{font-family:Arial,Helvetica,sans-serif;font-size:12px;color:var(--muted);margin-top:14px}
.fine a{color:var(--navy)}
</style></head><body>
